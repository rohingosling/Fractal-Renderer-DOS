; Mandelbrot Set Renderer Configuration File
; Version 3.3

[Settings]

; VESA Screen Resolution
;
; Possible values:
;
; - 640 x 400
; - 640 x 480
; - 800 x 600
; - 1024 x 768

width  = 1024
height = 768

; Rendering settings.
;
; antialiasing  = 0 or 1. Enables smooth iteration coloring to eliminate
;                 color banding at iteration boundaries. Toggle with 'a'.
;
; supersampling = 0, 2, 3, 4, or 5. Specifies NxN supersampling grid size
;                 for spatial anti-aliasing. 0 = disabled. Set with '0'-'5'.

antialiasing  = 0
supersampling = 0

; The image path specifies where screen shot images are saved.
; By default (image_path = ""), screen shots will go to the same folder
; as the executable. Otherwise, screen shots will be saved to the path
; specified by image_path.

image_path = "images"

; UI overlay color. RGB values in VGA DAC format (0-63 per channel).
; This single color is used for all UI elements: zoom box and scanline
; indicator.

ui_red   = 0
ui_green = 20
ui_blue  = 0

; Post-processing color normalization.
;
; When enabled, remaps the fractal color indices after rendering so that
; they span the full palette range (1-254). This maximizes color contrast
; by using the entire gradient, especially useful for deeply zoomed views
; where only a narrow band of iteration counts may be present.
;
; 0 = disabled
; 1 = enabled

normalize_color_range = 1

; Palette gradient control vectors.
;
; Each control vector defines an R,G,B color in VGA DAC format (0-63 per
; channel).
;
; - Keys are numbered sequentially: palette_control_vector_0,
;   palette_control_vector_1, etc.
;
; - Palette indices are computed dynamically by evenly distributing control
;   vectors across indices 1-254. Minimum 2 control vectors required.
;
; - Scanning stops at the first missing key.
;
; - If fewer than 2 valid control vectors are found, the built-in default
;   gradient is used.
;

; Default Gradient (Full Rainbow)
; 
; Black -> Blue -> Cyan -> Green -> Yellow -> Red -> Magenta
;
; Note:
; - We use dark magenta, (32,0,32) rather than (63,0,63) to create a more 
;   violet looking tone at the end of the gradient. It just looks a bit better. 

;palette_control_vector_0 = 0,   0,   0
;palette_control_vector_1 = 0,   0,   63
;palette_control_vector_2 = 0,   63,  63
;palette_control_vector_3 = 0,   63,  0
;palette_control_vector_4 = 63,  63,  0
;palette_control_vector_5 = 63,  0,   0
;palette_control_vector_6 = 32,  0,   32
;palette_control_vector_7 = 0,   0,   0

; RGB Palette.

;palette_control_vector_0 = 0,   0,   0
;palette_control_vector_1 = 0,   0,   63
;palette_control_vector_2 = 0,   63,  0
;palette_control_vector_3 = 63,  0,   0
;palette_control_vector_4 = 0,   0,   0

; Rainbow (No magenta)

;palette_control_vector_0 = 0,   0,   0
;palette_control_vector_1 = 0,   0,   63
;palette_control_vector_2 = 0,   63,  63
;palette_control_vector_3 = 0,   63,  0
;palette_control_vector_4 = 63,  63,  0
;palette_control_vector_5 = 63,  0,   0
;palette_control_vector_6 = 0,   0,   0

; Rainbow (No green and no magenta)

palette_control_vector_0 = 0,   0,   0
palette_control_vector_1 = 0,   0,   63
palette_control_vector_2 = 0,   63,  63
palette_control_vector_3 = 63,  63,  0
palette_control_vector_4 = 63,  0,   0
palette_control_vector_5 = 0,   0,   0

; Debug is used for testing. Currently it shows the palette used to render
; the fractal.
;
; debug = 0, means set debugging to off.
; debug = 1, means set debugging to on.

debug = 0
